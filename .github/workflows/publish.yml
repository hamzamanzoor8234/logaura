name: Publish to npm

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.NPM_ACCESS_TOKEN }}
    steps:
      - name: Verify npm auth secret
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::No npm token found. Add a Repository secret named NPM_TOKEN (recommended) or NPM_ACCESS_TOKEN."
            echo "::error::GitHub → Settings → Secrets and variables → Actions → New repository secret"
            echo "::error::https://github.com/hamzamanzoor8234/logaura/settings/secrets/actions"
            echo "::error::Token: npm granular, Read+Write on logaura, Bypass 2FA enabled."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: npm test

      - name: Verify npm credentials
        run: npm whoami

      - name: Publish package
        run: npm publish
